<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap + Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <title>Register - Sweet!</title>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">Sweet!</a>
  </div>
</nav>

<!-- Register Section -->
<section class="login d-flex align-items-center" style="height: 100vh;">
  <div class="container">
    <div class="row">
      <div class="col-lg-5 m-auto text-center">

        <h2 class="navbar-brand" href="#">Create Account</h2>


        <form>
          <input type="text" class="form-control mb-3" placeholder="First Name" required>
          <input type="text" class="form-control mb-3" placeholder="Last Name" required>
          <input type="text" class="form-control mb-3" placeholder="Middle Name" required>
          <input type="email" class="form-control mb-3" placeholder="Email Adress" required>
          <input type="number" class="form-control mb-3" placeholder="Contact Number" required>
          <input type="text" class="form-control mb-3" placeholder="Username" required>
          <input type="password" class="form-control mb-3" placeholder="Password" required>
          <input type="password" class="form-control mb-3" placeholder="Confirm Password" required>
           <input type="text" class="form-control mb-3" placeholder="City/Barangay/Street" required>
      



          <button class="btn1 w-100 mb-3">Register</button>

          <p>Already have an account? <a href="Login.html">Login</a></p>  <!-- login Link Connection-->

<!-- VALIDATION CHECKER  -->

          <script>
  const form = document.querySelector("form");

  form.addEventListener("submit", function(e) {
    const password = form.querySelectorAll("input")[3].value;
    const confirm = form.querySelectorAll("input")[4].value;

    if (password !== confirm) {
      e.preventDefault();
      alert("Passwords do not match!");
    }
  });
</script>

        </form>

      </div>
    </div>
  </div>
</section>

</body>
</html>
